<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="container">

        <div class="nav-container">
        <nav>
          <h3>
            <a href="index.html"
              ><img src="images/logotech.png" alt="" /> Tech<span
                >Touch</span
              ></a
            >
          </h3>

          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html">About</a></li>
            <li><a href="index.html">Services</a></li>
            <li><a href="index.html">Contact</a></li>
            <li>
              <a href="login.html"> <i class="fa-solid fa-user"></i> Sign Out</a>
            </li>
          </ul>
        </nav>
      </div>
<!-----------END OF NAV--->
      

        <div class="login-form">
            <div class="icon">
              <i class="fa-solid fa-cloud-sun"></i>
            </div>
            <div class="welcome">
                <h2>Welcome Back!</h2>
                <p>Sign In to access your guided mediations, daily practices, and personal journey.</p>
            </div>
            <div class="form">
                <form id="login_form" method="post">
                    <div class="logins">
                        <label for="email">Email</label>
                        <input type="email" placeholder="Enter Your Email" id="email" >
                    </div>

                    <div class="logins">
                        <label for="password">Password</label>
                        <input type="password" placeholder="Enter Your Password" id="password">
                    </div>

                    <div class="check">
                        <div class="check-left">
                           <input type="checkbox" id="checkbox">
                           <p>Remember Me</p>
                        </div>
                        <div class="check-right">
                           <a href="forgot.html">Forgot Password?</a>
                        </div>
                    </div>

                    <div class="btn">
                        <button type="submit">Log In</button>
                    </div>

                    <div class="or">
                            <hr style="flex: 1;">
                            <span>or sign in with</span>
                             <hr style="flex: 1;">
                    </div>


                    <div class="btn google">
                        <button><i class="fa-brands fa-google"></i><a href="#">Google</a></button>
                        <button><i class="fa-brands fa-apple"></i><a href="#">Apple</a></button>
                    </div>
                    
                </form>

                <div class="signup">
                        <p>Don't have an Account?</p>
                        <a href="register.html">Sign Up</a>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
