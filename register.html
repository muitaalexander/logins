<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>create account</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="register.css">
</head>
<body>
    <div class="container">

       <div class="register-form">

          <div class="register-left">
        
                                                                                
          </div>

          
          <div class="register-right">
            <h2>Create an account</h2>
            <p>Already have an account? <a href="login.html">Log in</a></p>

            <form>
                <div class="register">
                    <input type="text" placeholder="First Name" required>
                    <input type="text" placeholder="Last Name" required>
                </div>
                <div class="registers">
                    <input type="email" placeholder="Email" required>
                </div>
                <div class="registers">
                    <input type="password" placeholder="Enter Your Password" required>
                </div>
                <div class="check">
                    <input type="checkbox" required>
                    <p>I agree to the <a href="#">Terms and Conditions.</a></p>
                </div>
                <div class="btn">
                    <button type="submit">Create account</button>
                </div>
                <div class="or">
                <p>or Register with</p>
                </div>

                <div class="google-apple">
                    <div class="box">
                     <i class="fa-brands fa-google"></i><a href="https://www.google.com/">Google</a>
                    </div>
                    <div class="box">
                     <i class="fa-brands fa-apple"></i><a href="#">Apple</a>
                    </div>
                </div>
            </form>

          </div>
       </div>
       <!-------Create Account Ends Here-->
    </div>
</body>
</html>
